<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 140px 50px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-header {
            width: 100%;
            max-width: 720px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.7rem;
        }


        .flash {
            width: 100%;
            max-width:720px;
            margin-bottom: 20px;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.88rem;
        }
        .flash.success { background: #14532d; color: #86efac; }

        .card {
            width: 100%;
            max-width: 720px;
            background: #1e293b;
            border-radius: 20px;
            padding: 36px;
            border: 1px solid #334155;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: #f59e0b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 9px;
            color: white;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #f59e0b; }

        .note {
            font-size: 0.78rem;
            color: #475569;
            margin-top: 5px;
        }

        .btn-save {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #1a0a00;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            margin-top: 8px;
        }

    .btn-save:hover { background: linear-gradient(135deg, #b45309, #d97706); }
    
    .btn-dashboard {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000000;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            margin-top: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-dashboard:hover { background: linear-gradient(135deg, #b45309, #d97706); }
    
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="page-header">
        <h1>⚙️ Admin Profile</h1>
    </div>

    <div class="card">
        <h2><i class="fas fa-user-shield"></i> Update Admin Credentials</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ admin_email }}" placeholder="admin@maternalhealth.com">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password">
                <div class="note">Leave blank if you don't want to change the password.</div>
            </div>
            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </form>
            <a href="{{ url_for('dashboard') }}" class="btn-dashboard">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
