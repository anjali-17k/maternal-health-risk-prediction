<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 32px 24px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-header {
            width: 100%;
            max-width: 720px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.7rem;
        }

        
        .profile-card {
            width: 100%;
            max-width: 720px;
            background: #1e293b;
            border-radius: 20px;
            padding: 36px;
            border: 1px solid #334155;
        }

        .profile-card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: #f59e0b;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 1px solid #334155;
        }

        .avatar {
            width: 72px; height: 72px;
            border-radius: 18px;
            background: rgba(245,124,0,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .avatar-info h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(245,124,0,0.12);
            color: #fb923c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #1e3a5f;
        }

        .info-row:last-child { border-bottom: none; padding-bottom: 0; }

        .info-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: #0f172a;
            display: flex; align-items: center; justify-content: center;
            color: #64748b;
            font-size: 14px;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.95rem;
            color: white;
            font-weight: 500;
        }

        .info-value.muted { color: #475569; font-style: italic; }

        .btn-edit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #1a0a00;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .btn-edit:hover { background: linear-gradient(135deg, #b45309, #d97706); }
    
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #1a0a00;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .btn-back:hover { background: linear-gradient(135deg, #b45309, #d97706); }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>👤 My Profile</h1>
    </div>

    <div class="profile-card">
        <h2><i class="fas fa-id-card"></i> Account Information</h2>

        <div class="avatar-row">
            <div class="avatar">🛡️</div>
            <div class="avatar-info">
                <h3>{{ admin_username }}</h3>
                <span class="role-badge"><i class="fas fa-circle" style="font-size:6px;"></i> System Administrator</span>
            </div>
        </div>

        <div class="info-row">
            <div class="info-icon"><i class="fas fa-user"></i></div>
            <div>
                <div class="info-label">Username</div>
                <div class="info-value">{{ admin_username }}</div>
            </div>
        </div>

        <div class="info-row">
            <div class="info-icon"><i class="fas fa-envelope"></i></div>
            <div>
                <div class="info-label">Email Address</div>
                <div class="info-value {% if not admin_email %}muted{% endif %}">
                    {{ admin_email if admin_email else 'No email set' }}
                </div>
            </div>
        </div>

        <div class="info-row">
            <div class="info-icon"><i class="fas fa-shield-alt"></i></div>
            <div>
                <div class="info-label">Role</div>
                <div class="info-value">System Administrator</div>
            </div>
        </div>

        <div class="info-row">
            <div class="info-icon"><i class="fas fa-lock"></i></div>
            <div>
                <div class="info-label">Password</div>
                <div class="info-value muted">•••••••••••</div>
            </div>
        </div>
         <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 8px;">
        <a href="{{ url_for('admin_profile') }}" class="btn-edit">
            <i class="fas fa-edit"></i> Edit Profile
        </a>
         <a href="{{ url_for('dashboard') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
        </div>
    </div>
</body>
</html>
