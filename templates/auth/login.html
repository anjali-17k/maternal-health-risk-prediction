<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - {{ role.capitalize() }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-image: url("/static/images/17.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: #1a0a0f;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            background: #fafafa;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #e74c3c;
            background: white;
            box-shadow: 0 0 0 3px rgba(231,76,60,0.08);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.1rem;
            user-select: none;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: 0.3px;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn:hover {
            background: linear-gradient(135deg, #c0392b, #e67e22);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(231,76,60,0.3);
        }

        .btn-home {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            margin-top: 12px;
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #c0392b, #e67e22);
            box-shadow: 0 6px 20px rgb(255, 89, 24);
        }

        .error {
            background: #fde8ef;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
            padding: 11px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .register-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.88rem;
            color: #777;
        }

        .register-link a {
            color: #e74c3c;
            font-weight: 600;
            text-decoration: none;
        }

.register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h2>Welcome Back</h2>
            <span class="badge">{% if role == 'clinic' %}Hospital / Clinic{% else %}{{ role.replace('_', ' ') }}{% endif %}</span>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required placeholder="Enter your password">
                    <span class="password-toggle" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <a href="{{ url_for('home') }}" class="btn btn-home">← Back to Home</a>

        {% if role != 'clinic' and role != 'admin' %}
        <div class="register-link">
            No account? <a href="{{ url_for('register', role=role) }}">Register here</a>
        </div>
        {% endif %}
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = '🙈';
            } else {
                input.type = 'password';
                toggle.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
